<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Stackly</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link rel="stylesheet" href="auth.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <!-- LEFT SIDE - IMAGE -->
        <div class="auth-image-side">
            <img src="images/destination hero.webp" alt="Beautiful Beach" class="auth-bg">
            <div class="auth-overlay"></div>
            <div class="auth-image-content">
                <a href="index.html" class="auth-logo">
                    <img src="images/stackly logo.webp" alt="Logo">
                </a>
                <div class="auth-quote">
                    <h2>Welcome back to the journey.</h2>
                    <p>Log in to access your upcoming bookings, manage your itineraries, and discover your next great adventure.</p>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE - FORM -->
        <div class="auth-form-side">
            <div class="auth-form-container">
                <div class="auth-mobile-logo">
                    <a href="index.html" class="auth-logo">
                        <img src="images/stackly logo.webp" alt="Logo">
                    </a>
                </div>

                <div class="auth-header">
                    <h1>Sign In</h1>
                    <p>Enter your details to access your account.</p>
                </div>

                <form class="auth-form" id="authForm" data-type="login" novalidate>
                    
                    <div class="af-field">
                        <label for="authEmail">Email Address *</label>
                        <div class="af-input-wrap">
                            <i class="ri-mail-line icon"></i>
                            <input type="email" id="authEmail" placeholder="you@example.com" required title="Please enter a valid email address">
                            <i class="ri-error-warning-fill af-status error-icon"></i>
                            <i class="ri-checkbox-circle-fill af-status success-icon"></i>
                        </div>
                        <span class="af-error-msg"></span>
                    </div>

                    <div class="af-field">
                        <label for="authLoginPwd">Password *</label>
                        <div class="af-input-wrap">
                            <i class="ri-lock-line icon"></i>
                            <input type="password" id="authLoginPwd" placeholder="••••••••" required minlength="8" title="Password must be at least 8 characters">
                            <button type="button" class="af-toggle-pwd" aria-label="Toggle password visibility">
                                <i class="ri-eye-off-line"></i>
                            </button>
                            <i class="ri-error-warning-fill af-status error-icon"></i>
                        </div>
                        <span class="af-error-msg"></span>
                    </div>

                    <div class="af-field">
                        <label for="authRole">Login As</label>
                        <div class="af-input-wrap">
                            <i class="ri-user-settings-line icon"></i>
                            <select id="authRole" required>
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                            <i class="ri-arrow-down-s-line af-select-arrow"></i>
                        </div>
                    </div>

                    <div class="af-options">
                        <label class="af-checkbox">
                            <input type="checkbox" id="authRemember"> Remember me
                        </label>
                        <a href="404.html" class="af-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary af-submit">Log In</button>

                    <div class="af-footer">
                        Don't have an account? <a href="signup.html" class="af-link">Sign Up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
