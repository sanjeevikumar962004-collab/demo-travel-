<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Stackly</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <!-- LEFT SIDE - IMAGE -->
        <div class="auth-image-side">
            <img src="images/Himalayan Trek.webp" alt="Mountain Trek" class="auth-bg">
            <div class="auth-overlay" style="background: linear-gradient(180deg, rgba(15,23,42,0.7) 0%, rgba(14,165,233,0.2) 100%);"></div>
            <div class="auth-image-content">
                <a href="index.html" class="auth-logo">
                    <img src="images/stackly logo.webp" alt="Logo">
                </a>
                <div class="auth-quote">
                    <h2>Your next adventure starts here.</h2>
                    <p>Join our community of over 50,000 travellers and unlock exclusive deals, early access, and personalized itineraries.</p>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE - FORM -->
        <div class="auth-form-side">
            <div class="auth-form-container">
                <div class="auth-mobile-logo">
                    <a href="index.html" class="auth-logo">
                        <img src="images/stackly logo.webp" alt="Logo">
                    </a>
                </div>

                <div class="auth-header">
                    <h1>Create Account</h1>
                    <p>Join Stackly to plan your perfect trip.</p>
                </div>

                <form class="auth-form" id="authForm" data-type="signup" novalidate>
                    
                    <div class="af-row">
                        <div class="af-field">
                            <label for="authFName">First Name *</label>
                            <div class="af-input-wrap">
                                <i class="ri-user-line icon"></i>
                                <input type="text" id="authFName" placeholder="John" required minlength="2" pattern="[A-Za-z\s]+" title="First name must be at least 2 characters (letters only)">
                            </div>
                            <span class="af-error-msg"></span>
                        </div>
                        <div class="af-field">
                            <label for="authLName">Last Name *</label>
                            <div class="af-input-wrap">
                                <input type="text" id="authLName" placeholder="Doe" required minlength="2" pattern="[A-Za-z\s]+" title="Last name must be at least 2 characters (letters only)" style="padding-left:16px;">
                            </div>
                            <span class="af-error-msg"></span>
                        </div>
                    </div>

                    <div class="af-field">
                        <label for="authEmail">Email Address *</label>
                        <div class="af-input-wrap">
                            <i class="ri-mail-line icon"></i>
                            <input type="email" id="authEmail" placeholder="you@example.com" required title="Please enter a valid email address">
                            <i class="ri-error-warning-fill af-status error-icon"></i>
                            <i class="ri-checkbox-circle-fill af-status success-icon"></i>
                        </div>
                        <span class="af-error-msg"></span>
                    </div>

                    <div class="af-field">
                        <label for="authMobile">Mobile Number *</label>
                        <div class="af-input-wrap">
                            <i class="ri-phone-line icon"></i>
                            <input type="tel" id="authMobile" placeholder="10-digit mobile number" required maxlength="10" pattern="[0-9]{10}" title="Mobile number must be exactly 10 digits">
                            <i class="ri-error-warning-fill af-status error-icon"></i>
                            <i class="ri-checkbox-circle-fill af-status success-icon"></i>
                        </div>
                        <span class="af-error-msg"></span>
                    </div>

                    <div class="af-field">
                        <label for="authPwd">Password *</label>
                        <div class="af-input-wrap">
                            <i class="ri-lock-line icon"></i>
                            <input type="password" id="authPwd" placeholder="Min. 8 characters" required minlength="8" title="Password must be at least 8 characters">
                            <button type="button" class="af-toggle-pwd" aria-label="Toggle password visibility">
                                <i class="ri-eye-off-line"></i>
                            </button>
                            <i class="ri-error-warning-fill af-status error-icon"></i>
                            <i class="ri-checkbox-circle-fill af-status success-icon"></i>
                        </div>
                        <span class="af-error-msg"></span>
                    </div>

                    <div class="af-field">
                        <label for="authConfirmPwd">Confirm Password *</label>
                        <div class="af-input-wrap">
                            <i class="ri-lock-check-line icon"></i>
                            <input type="password" id="authConfirmPwd" placeholder="Repeat password" required minlength="8" title="Passwords must match">
                            <button type="button" class="af-toggle-pwd" aria-label="Toggle password visibility">
                                <i class="ri-eye-off-line"></i>
                            </button>
                            <i class="ri-error-warning-fill af-status error-icon"></i>
                            <i class="ri-checkbox-circle-fill af-status success-icon"></i>
                        </div>
                        <span class="af-error-msg"></span>
                    </div>

                    <div class="af-field">
                        <label for="authRole">Sign Up As</label>
                        <div class="af-input-wrap">
                            <i class="ri-user-settings-line icon"></i>
                            <select id="authRole" required style="width: 100%; padding: 12px 16px 12px 45px; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; font-size: 0.95rem; background: var(--bg-color); color: var(--text-color); cursor: pointer; appearance: none; outline: none; transition: border-color 0.3s ease;">
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                            <i class="ri-arrow-down-s-line" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--light-text); pointer-events: none;"></i>
                        </div>
                    </div>

                    <div class="af-options" style="margin-top:4px;">
                        <label class="af-checkbox">
                            <input type="checkbox" id="authTerms" required> 
                            <span>I agree to the <a href="404.html" class="af-link" style="font-weight:400;">Terms</a> and <a href="404.html" class="af-link" style="font-weight:400;">Privacy Policy</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary af-submit">Create Account</button>

                    <div class="af-footer">
                        Already have an account? <a href="login.html" class="af-link">Log In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
